name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run test suite
        run: pytest --tb=short

      - name: Run synthetic-data smoke test (full 20y)
        run: python backtest.py --synthetic --output-dir output/ci
        shell: bash

      - name: Run synthetic-data Monte Carlo smoke
        run: python backtest.py --synthetic --monte-carlo --mc-paths 500 --mc-years 10 --output-dir output/ci-mc
        shell: bash

      - name: Run sensitivity sweep smoke
        run: python backtest.py --synthetic --sensitivity gold --values 0.15 0.20 --output-dir output/ci-sens
        shell: bash

      - name: Run rolling-window smoke
        run: python backtest.py --synthetic --rolling-window --window-years 5 --step-months 12 --output-dir output/ci-roll
        shell: bash

      - name: Run efficient-frontier smoke
        run: python backtest.py --synthetic --efficient-frontier --n-random 1000 --output-dir output/ci-ef
        shell: bash

      - name: Run FIRE smoke
        run: python fire.py --synthetic --age 45 --capital 100000 --contributions 500 --fire-age 60 --spending 2000 --simulations 50 --output-dir output/ci-fire
        shell: bash

      - name: Verify smoke-test outputs
        run: |
          test -f output/ci/REPORT.md || (echo "REPORT.md missing" && exit 1)
          test -f output/ci/equity_curve.png || (echo "equity_curve.png missing" && exit 1)
          test -f output/ci/summary_statistics.csv || (echo "summary_statistics.csv missing" && exit 1)
          test -f output/ci-mc/monte_carlo_scenarios.png || (echo "MC scenarios chart missing" && exit 1)
          test -f output/ci-sens/sensitivity/gold.png || (echo "Sensitivity chart missing" && exit 1)
          test -f output/ci-roll/rolling_window/rolling_5y.png || (echo "Rolling window chart missing" && exit 1)
          test -f output/ci-ef/efficient_frontier/efficient_frontier.png || (echo "Efficient frontier chart missing" && exit 1)
          test -f output/ci-fire/fire_projection.png || (echo "FIRE projection chart missing" && exit 1)
          echo "All smoke test outputs verified."
        shell: bash

      - name: Upload output artifacts for manual inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-outputs-${{ matrix.os }}-py${{ matrix.python-version }}
          path: output/
          retention-days: 7

  # PR8: lint job. Runs in parallel to the matrix test job — single
  # Ubuntu/3.12 runner because lint output doesn't change across OS or
  # minor Python versions and the matrix would just multiply CI minutes.
  # Catches regressions on LESSONS Themes 2/19 (unused imports) and
  # Theme 18 (ASCII-only CLI output) before any PR is mergeable.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run ruff F401 (unused imports)
        run: ruff check --select F401 src/ tests/ backtest.py fire.py fetch_data.py analyze.py streamlit_app.py

      - name: Run ASCII-print check (LESSONS Theme 18)
        run: python scripts/check_ascii_print.py backtest.py fire.py fetch_data.py analyze.py src/
