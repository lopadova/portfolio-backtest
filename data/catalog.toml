# --- Explicit cash sleeve -------------------------------------------------
#
# Cash is NOT a CSV asset. It's a zero-return residual handled specially by
# the engine. We still register it in the catalog so UIs can enumerate it
# alongside "real" assets and users can add it explicitly to a portfolio.

[assets.cash]
display_name = "Cash (zero-yield buffer)"
filename     = "__cash__"
category     = "cash"
native_ccy   = "EUR"
is_hedged    = true
ter          = 0.0
description  = "Residual cash sleeve; earns 0% in the conservative base model"


