# ==========================================================================
# Portfolio Backtest Engine — Data Catalog
# ==========================================================================
#
# Manifest of every dataset the engine can consume. Each entry maps a stable
# KEY (used in portfolio compositions and in sleeve logic) to the CSV file
# in data/raw/ and the semantic metadata needed to correctly interpret its
# returns (currency, hedging, TER) and to display it to users.
#
# Start/end dates are NOT stored here — they are inferred at runtime from
# data/raw/<filename>.csv by src/data_catalog.augment_with_raw_dates().
#
# To ADD a new dataset: register it here (one [assets.<key>] block) and drop
# the CSV into data/raw/. No code changes required once the engine is fully
# decoupled (PR3+). In PR2 some consumers still read SYMBOL_MAP / HEDGED /
# TER_ANNUAL globals in src/portfolio.py; keep those in sync for now.
#
# Categories: equity | bond | commodity | crypto | fx | cash | alt
# ==========================================================================


